name: DduiTestPlugin
version: 1.0.0
api:
  - "2.0.0"
main: cn.nukkit.plugin.dduitest.DduiTestPlugin
author: DDUI Test Team
description: A plugin to test all Data-Driven UI elements with comprehensive logging
commands:
  dduitest:
    description: Open the DDUI test form
    usage: "/dduitest"
    permission: nukkit.command.dduitest
permissions:
  nukkit.command.dduitest:
    description: Allows player to use /dduitest command
    default: op
