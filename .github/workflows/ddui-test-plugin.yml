name: DDUI Test Plugin Build

on:
  push:
    branches: [ dota-ui-elements-tester-plugin-3c5d0 ]
    paths:
      - 'ddui-test-plugin/**'
  pull_request:
    branches: [ dota-ui-elements-tester-plugin-3c5d0 ]
    paths:
      - 'ddui-test-plugin/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build main project first (Maven)
      run: |
        mvn -B package --file pom.xml -DskipTests

    - name: Build DDUI Test Plugin (Maven)
      run: |
        cd ddui-test-plugin
        mvn -B clean package --file pom.xml

    - name: Upload DDUI Test Plugin artifact
      uses: actions/upload-artifact@v4
      with:
        name: DDUI-TestPlugin
        path: ddui-test-plugin/target/DDUI-TestPlugin-*.jar
